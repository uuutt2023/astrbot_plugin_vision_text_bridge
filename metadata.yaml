name: astrbot_plugin_vision_text_bridge
display_name: 图片转文字 — 图像理解桥接
desc: 拦截 AstrBot 对话中的图片，调用 MiniMax CLI 图像理解后替换为文字描述，再交给对话 LLM。同时暴露 OpenAI 兼容接口供 smart_imagechat_hub 等插件作为 vision provider 调用，支持三级缓存、WebUI 缓存管理、表头排序、调用日志面板。
short_desc: 图片转文字桥接：把图片转成文本描述喂给 LLM，同时作为 vision provider 供其他插件调用。
version: 1.1.3
author: "uuutt"
repo: https://github.com/uuutt2023/astrbot_plugin_vision_text_bridge
astrbot_version: ">=4.0.0"
support_platforms:
  - aiocqhttp
  - telegram
  - slack
  - lark
  - wecom
  - discord
  - dingtalk
  - gewechat
  - wechatpad
