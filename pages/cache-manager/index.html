<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vision Text Bridge · 缓存管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <header class="topbar glass">
    <div class="brand">
      <div class="brand-mark">🖼️</div>
      <div>
        <h1>Vision Text Bridge</h1>
        <p class="subtitle">mmx 视觉描述的 SQLite 缓存 · 命中后秒返文本</p>
      </div>
    </div>
    <div class="topbar-actions">
      <span class="badge" id="db-path-badge" title="">DB: loading…</span>
    </div>
  </header>

  <main>
    <section class="cards">
      <div class="card glass">
        <div class="card-label">缓存条目</div>
        <div class="card-value" id="stat-total">-</div>
        <div class="card-hint" id="stat-total-hint">total</div>
      </div>
      <div class="card glass">
        <div class="card-label">总命中数</div>
        <div class="card-value" id="stat-hits">-</div>
        <div class="card-hint">hit_count 累计</div>
      </div>
      <div class="card glass">
        <div class="card-label">DB 大小</div>
        <div class="card-value" id="stat-dbsize">-</div>
        <div class="card-hint">SQLite file</div>
      </div>
      <div class="card glass">
        <div class="card-label">内存热缓存</div>
        <div class="card-value" id="stat-memcache">-</div>
        <div class="card-hint">in-memory</div>
      </div>
    </section>

    <section class="toolbar glass">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="search-input"
          placeholder="搜索 URL 或描述..."
          autocomplete="off"
        />
      </div>
      <select id="order-by">
        <option value="created_at_desc">最新优先</option>
        <option value="created_at_asc">最旧优先</option>
        <option value="hit_count_desc">命中最多</option>
        <option value="hit_count_asc">命中最少</option>
      </select>
      <button class="btn primary" id="refresh-btn" title="刷新 (R)">🔄 刷新</button>
      <button class="btn" id="export-btn">⬇️ 导出 JSON</button>
      <button class="btn danger" id="clear-btn">🗑️ 清空全部</button>
    </section>

    <section class="table-wrap glass">
      <table id="cache-table">
        <thead>
          <tr>
            <th style="width: 96px">缩略图</th>
            <th>URL / 路径</th>
            <th>描述（mmx vision describe）</th>
            <th style="width: 80px">命中</th>
            <th style="width: 90px">尺寸</th>
            <th style="width: 160px">创建时间</th>
            <th style="width: 120px">操作</th>
          </tr>
        </thead>
        <tbody id="cache-tbody">
          <tr class="empty">
            <td colspan="7">
              <div class="empty-state">
                <div class="empty-icon">⏳</div>
                <div>加载中...</div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </section>

    <section class="pagination glass">
      <span id="page-info">-</span>
      <div class="page-buttons">
        <button class="btn ghost" id="prev-btn">← 上一页</button>
        <button class="btn ghost" id="next-btn">下一页 →</button>
      </div>
    </section>
  </main>

  <!-- Modal: 查看单条记录 -->
  <div class="modal-mask" id="detail-modal" hidden>
    <div class="modal-card glass">
      <div class="modal-header">
        <h3>📄 缓存详情</h3>
        <button class="icon-btn" id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
