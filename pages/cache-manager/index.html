<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Vision Text Bridge · 缓存管理</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <h1>🖼️ Vision Text Bridge · 缓存管理</h1>
    <p class="subtitle">把图片 URL/路径 转成 mmx 视觉描述的 SQLite 缓存。命中后直接返回描述，不重复调用 mmx。</p>
  </header>

  <section class="cards">
    <div class="card">
      <div class="card-label">缓存条目</div>
      <div class="card-value" id="stat-total">-</div>
    </div>
    <div class="card">
      <div class="card-label">总命中数</div>
      <div class="card-value" id="stat-hits">-</div>
    </div>
    <div class="card">
      <div class="card-label">DB 大小</div>
      <div class="card-value" id="stat-dbsize">-</div>
    </div>
    <div class="card">
      <div class="card-label">内存热缓存</div>
      <div class="card-value" id="stat-memcache">-</div>
    </div>
    <div class="card wide">
      <div class="card-label">Chat Archive 联动</div>
      <div class="card-value small" id="stat-chatarchive">-</div>
    </div>
  </section>

  <section class="toolbar">
    <input
      type="text"
      id="search-input"
      placeholder="搜索 URL 或描述..."
      autocomplete="off"
    />
    <select id="order-by">
      <option value="created_at_desc">最新优先</option>
      <option value="created_at_asc">最旧优先</option>
      <option value="hit_count_desc">命中最多</option>
      <option value="hit_count_asc">命中最少</option>
    </select>
    <button class="btn primary" id="refresh-btn">🔄 刷新</button>
    <button class="btn warn" id="export-btn">⬇️ 导出 JSON</button>
    <button class="btn danger" id="clear-btn">🗑️ 清空全部</button>
    <button class="btn" id="chatarchive-refresh-btn">🔗 刷新 Chat Archive 联动</button>
  </section>

  <section class="table-wrap">
    <table id="cache-table">
      <thead>
        <tr>
          <th>#</th>
          <th>图片 URL / 路径</th>
          <th>描述（mmx vision describe 输出）</th>
          <th>命中</th>
          <th>创建时间</th>
          <th>最近命中</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="cache-tbody">
        <tr class="empty">
          <td colspan="7">加载中...</td>
        </tr>
      </tbody>
    </table>
  </section>

  <section class="pagination">
    <span id="page-info">-</span>
    <button class="btn" id="prev-btn">← 上一页</button>
    <button class="btn" id="next-btn">下一页 →</button>
  </section>

  <div id="toast" class="toast"></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
